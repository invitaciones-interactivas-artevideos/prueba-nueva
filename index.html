<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ── VARIABLES DE DISEÑO ── */
:root {
  --bg-1: #FFFFFF;    /* Blanco Puro */
  --bg-2: #F2E8E8;    /* Rosado Suave Visible */
  --accent: #D4A5A5; 
  --title-color: #4A3B3B;
  --text-color: #8A7575;
  --title-font: 'Cormorant Garamond', serif;
  --body-font: 'Jost', sans-serif;
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
    background-color: var(--bg-1); color: var(--text-color); 
    font-family: var(--body-font); line-height: 1.6; text-align: center;
}

/* ── PORTADA ── */
#cover {
  position: relative; height: 100vh; display: flex; 
  align-items: center; justify-content: center; overflow: hidden; color: white;
}
#cover-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
#cover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); }
#cover-content { position: relative; z-index: 2; padding: 20px; }
#cover h1 { font-family: var(--title-font); font-size: clamp(2.2rem, 8vw, 4rem); font-weight: 300; letter-spacing: 2px; }

.scroll-arrow {
    position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 30px; color: white; z-index: 10; animation: bounce 2s infinite;
}
@keyframes bounce { 0%, 100% { transform: translate(-50%, 0); opacity: 0.3; } 50% { transform: translate(-50%, 15px); opacity: 1; } }

/* ── SECCIONES (Alternancia de color corregida) ── */
section { padding: 6rem 1.5rem; opacity: 0; transform: translateY(20px); transition: 1s all ease; }
section.visible { opacity: 1; transform: translateY(0); }

/* Colores de fondo intercalados */
section:nth-of-type(odd) { background-color: var(--bg-1) !important; }
section:nth-of-type(even) { background-color: var(--bg-2) !important; }

h2 { 
    font-family: var(--title-font); 
    font-size: 2rem; /* Tamaño más delicado */
    font-weight: 300;
    letter-spacing: 4px; /* Más espacio para elegancia */
    text-transform: uppercase;
    color: var(--title-color); 
    margin-bottom: 2rem; 
}

/* ── CUENTA REGRESIVA ── */
.countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 2rem auto; }
.cd-item { background: white; padding: 15px 5px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); }
.cd-num { display: block; font-family: var(--title-font); font-size: 1.6rem; color: var(--accent); font-weight: bold; }
.cd-lab { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; }

/* ── GALERÍA ── */
.gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 2rem; }
.gallery-item { aspect-ratio: 1/1; overflow: hidden; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; }

/* ── BOTONES 3D BURBUJA ── */
/* ── BOTONES 3D MEJORADOS (Para que siempre se vean) ── */
.btn {
    display: inline-block; 
    padding: 1rem 2.2rem; 
    margin: 10px;
    /* Usamos el color de acento de la paleta como fondo principal */
    /* Busca esta línea dentro de .btn y cámbiala por esta: */
background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, var(--accent) 100%);
    /* El texto ahora es blanco para que resalte sobre el color */
    color: #FFFFFF !important; 
    border: none; 
    border-radius: 50px;
    font-size: 0.75rem; 
    font-weight: 600; 
    text-transform: uppercase; 
    letter-spacing: 2px;
    text-decoration: none; 
    cursor: pointer; 
    transition: 0.3s;
    /* Sombra 3D refinada */
    box-shadow: 0 8px 15px rgba(0,0,0,0.15), 
                inset 0 -4px 6px rgba(0,0,0,0.2), 
                inset 0 4px 6px rgba(255,255,255,0.3);
}

.btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.1); /* Brilla un poco al pasar el mouse */
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.btn:active {
    transform: translateY(2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* El botón de WhatsApp (btn-pink) ya no necesita un estilo diferente 
   porque todos los botones ahora son resaltados */
.btn:active { transform: translateY(2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

/* ── MODAL & TOAST ── */
.modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center; z-index: 4000; padding: 20px;
}
.modal-content {
    background: rgba(255, 255, 255, 0.25); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px; width: 100%; max-width: 380px; padding: 2rem; color: white;
}
.bank-card { background: rgba(0,0,0,0.25); border-radius: 20px; padding: 1rem; margin: 1.5rem 0; }
.bank-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.bank-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; }
.bank-value { font-size: 1rem; display: block; font-weight: 300; }

#toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: white; padding: 10px 25px;
    border-radius: 50px; font-size: 0.8rem; z-index: 7000; display: none;
}

#music-btn {
    position: fixed; bottom: 25px; right: 25px; width: 45px; height: 45px;
    background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 5000; cursor: pointer; color: var(--accent);
}

#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; }
#lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; }

@media (min-width: 768px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
</style>
</head>
<body>

<div id="toast">Cuenta copiada</div>

<div id="music-btn" onclick="toggleMusic()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
</div>
<audio id="bg-music" src="musica.mp3" loop></audio>

<div id="cover">
    <div id="cover-bg"></div>
    <div id="cover-overlay"></div>
    <div id="cover-content">
        <span style="text-transform: uppercase; letter-spacing: 5px; font-size: 0.65rem; display: block; margin-bottom: 1.5rem;" id="t-eyebrow"></span>
        <h1 id="t-names"></h1>
        <p id="t-cover-date" style="letter-spacing: 3px; font-size: 0.8rem; margin-top: 1rem;"></p>
    </div>
    <div class="scroll-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg></div>
</div>

<div id="main-content">
    <!-- El JS inyecta las secciones aquí -->
</div>

<!-- Modal -->
<div id="gift-modal" class="modal" onclick="closeGiftModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="color:white; font-size: 1.5rem; letter-spacing: 2px;">Regalo</h2>
        <p id="m-texto" style="font-size: 0.85rem; margin-bottom: 10px; opacity: 0.9;"></p>
        <div class="bank-card">
            <div class="bank-item"><span class="bank-label">Titular</span><span class="bank-value" id="m-titular"></span></div>
            <div class="bank-item"><span class="bank-label">Banco</span><span class="bank-value" id="m-banco"></span></div>
            <div class="bank-item"><span class="bank-label">Número</span><span class="bank-value" id="m-cuenta"></span></div>
            <div class="bank-item"><span class="bank-label">CI</span><span class="bank-value" id="m-ci"></span></div>
        </div>
        <button class="btn btn-pink" style="width: 100%;" onclick="copyAcc()">Copiar número</button>
    </div>
</div>

<div id="lightbox" onclick="closeLightbox()"><img src="" onclick="event.stopPropagation()"></div>

<script>
const CONFIG = {
    global: {
        nombres: "Sofía & Martín",
        frase: "¡Nos Casamos!",
        fecha: "20 . 12 . 2026",
        fechaCuenta: new Date(2026, 11, 20, 18, 0),
        fotoPort: "cover.jpg"
    },
    // MAPAS: Usamos enlaces de búsqueda directa para evitar errores de Firebase
    eventos: {
        ceremonia: { t: "Ceremonia", f: "20 de Dic", h: "18:00 Hs", l: "Iglesia San Francisco de Asis", d: "Cmno Torres 2123, Montevideo, Uruguay", m: "https://www.google.com/maps/search/?api=1&query=Parque+Rodo+Montevideo" },
        fiesta: { t: "Fiesta", f: "20 de Dic", h: "21:00 Hs", l: "Salón Aurora Palace, Avda Las Flores 2121 Parque Rodó", d: "Montevideo, Uruguay", m: "https://www.google.com/maps/search/?api=1&query=Parque+Rodo+Montevideo" }
    },
    regalos: {
        texto: "El mejor regalo es tu presencia, pero si deseas colaborar con nuestros sueños:",
        titular: "Sofía y Martín", banco: "Santander", cuenta: "1234567890", ci: "1.234.567-8"
    },
    cierre: { t: "¡Te esperamos!", s: "Tu presencia es muy importante para nosotros." },
    fotos: ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg", "foto6.jpg", "foto7.jpg", "foto8.jpg", "foto9.jpg", "foto10.jpg"]
};

// Renderizado de Portada
document.getElementById('cover-bg').style.backgroundImage = `url('${CONFIG.global.fotoPort}')`;
document.getElementById('t-names').innerHTML = CONFIG.global.nombres.replace('&', '<em>&</em>');
document.getElementById('t-eyebrow').innerText = CONFIG.global.frase;
document.getElementById('t-cover-date').innerText = CONFIG.global.fecha;

const main = document.getElementById('main-content');
const iconSet = {
    heart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
    calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
    map: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    camera: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
    rings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="8" cy="12" r="6"/><circle cx="16" cy="12" r="6"/></svg>`,
    gift: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>`
};

function createSec(id, icon, title, body) {
    const s = document.createElement('section');
    s.id = id;
    s.innerHTML = `<div style="max-width:800px; margin:0 auto;"><div style="width:45px; margin:0 auto 1.5rem; color:var(--accent)">${iconSet[icon]}</div><h2>${title}</h2>${body}</div>`;
    main.appendChild(s);
}

// 1. Historia
createSec('historia', 'heart', 'Nuestra Historia', '<p>En un mundo lleno de coincidencias, encontrarnos fue nuestro momento favorito.</p>');
// 2. Cuenta
createSec('cuenta', 'calendar', 'Falta Poco', `<div class="countdown-grid"><div class="cd-item"><span class="cd-num" id="days">00</span><span class="cd-lab">Días</span></div><div class="cd-item"><span class="cd-num" id="hours">00</span><span class="cd-lab">Hs</span></div><div class="cd-item"><span class="cd-num" id="mins">00</span><span class="cd-lab">Min</span></div><div class="cd-item"><span class="cd-num" id="secs">00</span><span class="cd-lab">Seg</span></div></div>`);
// 3. Ubicacion
createSec('ubicacion', 'map', 'Dónde & Cuándo', `<div><h3>${CONFIG.eventos.ceremonia.t}</h3><p>${CONFIG.eventos.ceremonia.f} - ${CONFIG.eventos.ceremonia.h}<br>${CONFIG.eventos.ceremonia.l}<br>${CONFIG.eventos.ceremonia.d}</p><a href="${CONFIG.eventos.ceremonia.m}" target="_blank" class="btn">Ver Mapa</a></div><div style="margin-top:3rem"><h3>${CONFIG.eventos.fiesta.t}</h3><p>${CONFIG.eventos.fiesta.f} - ${CONFIG.eventos.fiesta.h}<br>${CONFIG.eventos.fiesta.l}<br>${CONFIG.eventos.fiesta.d}</p><a href="${CONFIG.eventos.fiesta.m}" target="_blank" class="btn">Ver Mapa</a></div>`);
// 4. Galeria
let g = `<div class="gallery-grid">`;
CONFIG.fotos.forEach(f => g += `<div class="gallery-item" onclick="openLightbox('${f}')"><img src="${f}"></div>`);
createSec('galeria', 'camera', 'Momentos', g + `</div>`);
// 5. RSVP
createSec('rsvp', 'rings', 'Confirmación', `<p>Por favor, confirma tu asistencia.</p><a href="https://wa.me/59899000000" target="_blank" class="btn btn-pink">Confirmar WhatsApp</a>`);
// 6. Regalos
createSec('regalos', 'gift', 'Regalos', `<p>Si deseas hacernos un presente...</p><button class="btn" onclick="openGiftModal()">Ver Datos</button>`);
// 7. Cierre (Como sección real para intercalar color)
createSec('cierre', 'heart', CONFIG.cierre.t, `<p>${CONFIG.cierre.s}</p><div style="width:120px; margin:2rem auto; color:var(--accent); opacity:0.5;"><svg viewBox="0 0 100 20" stroke="currentColor"><path d="M0 10 Q25 0 50 10 T100 10" fill="none"/></svg></div>`);

// --- LOGICA INTERNA ---
function toggleMusic() { const m = document.getElementById('bg-music'); m.paused ? m.play() : m.pause(); }
function openLightbox(s) { document.getElementById('lightbox').querySelector('img').src = s; document.getElementById('lightbox').style.display = 'flex'; history.pushState({v:'lb'},""); }
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
function openGiftModal() {
    const r = CONFIG.regalos;
    document.getElementById('m-texto').innerText = r.texto;
    document.getElementById('m-titular').innerText = r.titular;
    document.getElementById('m-banco').innerText = r.banco;
    document.getElementById('m-cuenta').innerText = r.cuenta;
    document.getElementById('m-ci').innerText = r.ci;
    document.getElementById('gift-modal').style.display = 'flex';
    history.pushState({v:'mo'},"");
}
function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }
window.onpopstate = () => { closeLightbox(); closeGiftModal(); };

function copyAcc() {
    navigator.clipboard.writeText(CONFIG.regalos.cuenta);
    const t = document.getElementById('toast');
    t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000);
}

function updateCD() {
    const t = CONFIG.global.fechaCuenta - new Date();
    if(t<0) return;
    document.getElementById('days').innerText = Math.floor(t/86400000);
    document.getElementById('hours').innerText = Math.floor((t/3600000)%24);
    document.getElementById('mins').innerText = Math.floor((t/60000)%60);
    document.getElementById('secs').innerText = Math.floor((t/1000)%60);
}
setInterval(updateCD, 1000);
const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold:0.1});
document.querySelectorAll('section').forEach(s => obs.observe(s));
</script>
</body>
</html>
