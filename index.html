<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="" rel="stylesheet">

<style>
/* ── VARIABLES DE DISEÑO (Se auto-ajustan con el CONFIG) ── */
:root {
  --bg-1: #ffffff;
  --bg-2: #f9f9f9;
  --accent: #C9A98C;
  --title-color: #2E2822;
  --text-color: #8C7B6E;
  --title-font: 'Cormorant Garamond', serif;
  --body-font: 'Jost', sans-serif;
  --title-size: 3.5rem;
  --title-lh: 1.0; 
  --text-size: 1.1rem;
  --section-spacing: 7rem;
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
    background-color: var(--bg-1); 
    color: var(--text-color); 
    font-family: var(--body-font); 
    line-height: 1.7;
    text-align: center;
}

/* ── PORTADA ── */
#cover {
  position: relative; height: 100vh; display: flex; 
  align-items: center; justify-content: center; overflow: hidden;
  color: white;
}
#cover-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transform: scale(1.05);
}
#cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
}
#cover-content { position: relative; z-index: 2; padding: 20px; }
#cover h1 { 
    font-family: var(--title-font); font-size: clamp(3rem, 12vw, 6rem); 
    font-weight: 300; line-height: 1; margin-bottom: 1rem;
}
.eyebrow { text-transform: uppercase; letter-spacing: 6px; font-size: 0.75rem; margin-bottom: 2rem; display: block; }

/* ── SECCIONES ── */
.section-wrapper {
    padding: var(--section-spacing) 1.5rem;
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; transition: all 1.2s ease-out;
}
.section-wrapper.visible { opacity: 1; }
.section-wrapper:nth-child(odd) { background-color: var(--bg-1); }
.section-wrapper:nth-child(even) { background-color: var(--bg-2); }

.container { max-width: 800px; width: 100%; margin: 0 auto; }

h2 {
    font-family: var(--title-font);
    font-size: var(--title-size);
    color: var(--title-color);
    line-height: var(--title-lh);
    font-weight: 300; margin-bottom: 2rem;
}

/* ── ESTILOS EVENTOS ── */
.event-box { margin-bottom: 4rem; width: 100%; }
.event-title { 
    font-family: var(--title-font); font-size: 2.2rem; 
    color: var(--accent); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 2px;
}
.event-info { font-size: 1.1rem; margin-bottom: 0.5rem; }
.event-info strong { color: var(--title-color); display: block; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-top: 10px; }

/* ── GALERÍA ── */
.gallery-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px; margin-top: 3rem;
}
.gallery-item { overflow: hidden; aspect-ratio: 1/1; cursor: pointer; border-radius: 4px; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
.gallery-item:hover img { transform: scale(1.1); }

/* ── RSVP & CIERRE ── */
.rsvp-section { background-color: var(--bg-2); padding: 5rem 1.5rem; }
.final-message { font-family: var(--title-font); font-size: 2.5rem; color: var(--title-color); margin-top: 3rem; font-weight: 300; }
.ornament { width: 150px; margin: 2rem auto; color: var(--accent); opacity: 0.7; }
.ornament svg { width: 100%; height: auto; fill: currentColor; }

/* ── BOTONES ── */
.btn {
    display: inline-block; padding: 1.2rem 2.8rem; border: 1px solid var(--accent);
    color: var(--accent); text-decoration: none; text-transform: uppercase;
    letter-spacing: 2px; font-size: 0.75rem; margin-top: 1.5rem; cursor: pointer;
    background: transparent; transition: 0.3s;
}
.btn:hover { background: var(--accent); color: white; }
.btn-wa { background: #25D366; color: white; border-color: #25D366; font-weight: 600; }
.btn-wa:hover { background: #128C7E; border-color: #128C7E; }

/* ── MODALES ── */
#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; }
#lightbox img { max-width: 90%; max-height: 85%; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
.modal-content { background: var(--bg-1); padding: 3rem; border-radius: 4px; max-width: 500px; width: 90%; position: relative; }

.countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 2rem; }
.cd-num { display: block; font-family: var(--title-font); font-size: 2.5rem; color: var(--accent); }
.icon-wrapper { width: 50px; height: 50px; margin: 0 auto 1rem; color: var(--accent); }
.icon-wrapper svg { width: 100%; height: 100%; fill: none; stroke: currentColor; }

@media (max-width: 600px) {
    :root { --title-size: 2.6rem; --section-spacing: 4.5rem; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- Portada -->
<div id="cover">
    <div id="cover-bg"></div>
    <div id="cover-overlay"></div>
    <div id="cover-content">
        <span class="eyebrow" id="t-eyebrow"></span>
        <h1 id="t-names"></h1>
        <p id="t-cover-date" style="color:white; letter-spacing:3px; text-transform:uppercase; font-size:0.8rem;"></p>
    </div>
</div>

<!-- Contenedor de Secciones -->
<div id="main-content"></div>

<!-- Modal Regalos -->
<div id="gift-modal" class="modal" onclick="if(event.target==this) closeGiftModal()">
    <div class="modal-content">
        <h2 style="font-size: 1.8rem;">Datos para el Regalo</h2>
        <div id="bank-details" style="line-height: 2; margin-top: 1.5rem;"></div>
        <button class="btn" onclick="closeGiftModal()">Cerrar</button>
    </div>
</div>

<!-- Lightbox Galería -->
<div id="lightbox" onclick="this.style.display='none'"><img src="" alt=""></div>

<script>
/* ════════════════════════════════════════
   ★ CONFIGURACIÓN FÁCIL (EDITA AQUÍ)
═════════════════════════════════════════= */

const CONFIG = {
    // 1. ELIGE LA PALETA (1 al 10)
    paletaElegida: 2, 

    // 2. DATOS DE LOS EVENTOS
    eventos: {
        ceremonia: {
            titulo: "Ceremonia",
            fecha: "Sábado 20 de Diciembre, 2026",
            hora: "18:00 Horas",
            lugar: "Parroquia San José",
            direccion: "Calle de la Fe 123, Ciudad",
            linkMapa: "https://google.com/maps"
        },
        fiesta: {
            titulo: "Fiesta",
            fecha: "Sábado 20 de Diciembre, 2026",
            hora: "21:00 Horas",
            lugar: "Salón Jardines de Gala",
            direccion: "Av. Principal 456, Sector Norte",
            linkMapa: "https://google.com/maps"
        }
    },

    // 3. CONFIRMACIÓN (WhatsApp)
    rsvp: {
        titulo: "Confirmación",
        texto: "Tu presencia es muy importante para nosotros. Por favor, confírmanos tu asistencia antes del 1 de Diciembre.",
        whatsapp: "59899000000", // Código de país + número sin símbolos
        mensajePredeterminado: "¡Hola! Confirmo mi asistencia a la boda de Sofía y Martín."
    },

    // 4. REGALOS
    regalos: {
        banco: "Banco Santander",
        titular: "Sofía & Martín",
        cuenta: "CBU: 000001234567890123",
        ci: "C.I. 1.234.567-8",
        extra: "¡Muchas gracias!"
    },

    // 5. CIERRE Y ORNAMENTO
    cierre: {
        mensaje: "¡Te esperamos!", // El texto final grande
        subtexto: "Para compartir juntos este día inolvidable.",
        tipoOrnamento: "floral", // Opciones: 'floral', 'minimal', 'clasico', 'ninguno'
    },

    // 6. DATOS GENERALES Y FOTOS
    global: {
        nombres: "Sofía & Martín",
        frasePortada: "¡Nos Casamos!",
        fechaPortada: "20 . 12 . 2026",
        fechaCuentaRegresiva: new Date(2026, 11, 20, 18, 0),
        fotoPortada: "cover.jpg",
        interlineadoTitulos: "1.0", // Espaciado entre líneas de los títulos
        fuenteEstilo: "A" // A, B o C
    },

    fotosGaleria: [
        "foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg",
        "foto6.jpg", "foto7.jpg", "foto8.jpg", "foto9.jpg", "foto10.jpg"
    ]
};

/* ════════════════════════════════════════
   SISTEMA DE DISEÑO (No tocar)
═════════════════════════════════════════= */

const ORNAMENTOS = {
    floral: `<svg viewBox="0 0 100 40"><path d="M10 20 Q25 10 40 20 T70 20 T90 20 M30 15 Q35 5 40 15 M60 15 Q65 5 70 15" fill="none" stroke="currentColor" stroke-width="0.5"/><circle cx="50" cy="20" r="1.5"/></svg>`,
    minimal: `<svg viewBox="0 0 100 20"><line x1="0" y1="10" x2="40" y2="10" stroke="currentColor" stroke-width="0.5"/><circle cx="50" cy="10" r="2" fill="none" stroke="currentColor"/><line x1="60" y1="10" x2="100" y2="10" stroke="currentColor" stroke-width="0.5"/></svg>`,
    clasico: `<svg viewBox="0 0 100 30"><path d="M0 15 C20 5 30 25 50 15 C70 5 80 25 100 15" fill="none" stroke="currentColor" stroke-width="0.5"/></svg>`
};

const PALETAS = {
    1: { bg1:'#FFFFFF', bg2:'#F7F3EF', accent:'#C9A98C', title:'#2E2822', text:'#8C7B6E' },
    2: { bg1:'#FDF8F8', bg2:'#F2E4E4', accent:'#A67C7C', title:'#4A3B3B', text:'#635151' },
    3: { bg1:'#FFFFFF', bg2:'#E3E9E1', accent:'#6B7C69', title:'#2A3328', text:'#4A5448' },
    4: { bg1:'#1A1A1A', bg2:'#2D2D2D', accent:'#D4AF37', title:'#FFFFFF', text:'#CCCCCC' },
    5: { bg1:'#F0F4F7', bg2:'#D1DAE3', accent:'#4A6FA5', title:'#1A253A', text:'#45566E' },
    6: { bg1:'#FFFFFF', bg2:'#F2F2F2', accent:'#333333', title:'#000000', text:'#666666' },
    7: { bg1:'#FAF9F6', bg2:'#E9E4D9', accent:'#8E735B', title:'#433932', text:'#6B6158' },
    8: { bg1:'#FFFBF0', bg2:'#F2E8C4', accent:'#B59410', title:'#3D340B', text:'#70642F' },
    9: { bg1:'#F9F7F5', bg2:'#DED0C1', accent:'#7A5C41', title:'#3E2F22', text:'#5C4E42' },
    10:{ bg1:'#FFFFFF', bg2:'#FFEEEE', accent:'#E94E77', title:'#333333', text:'#666666' }
};

const ICONOS = {
    heart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
    calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
    map: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    camera: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
    gift: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>`,
    rings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="8" cy="12" r="6"/><circle cx="16" cy="12" r="6"/></svg>`
};

// Aplicar estilos
const pal = PALETAS[CONFIG.paletaElegida] || PALETAS[1];
const r = document.documentElement.style;
r.setProperty('--bg-1', pal.bg1); r.setProperty('--bg-2', pal.bg2);
r.setProperty('--accent', pal.accent); r.setProperty('--title-color', pal.title);
r.setProperty('--text-color', pal.text); r.setProperty('--title-lh', CONFIG.global.interlineadoTitulos);

const fConfig = {
    A: { serif:'Cormorant Garamond', sans:'Jost', gf:'Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400' },
    B: { serif:'Playfair Display', sans:'Lato', gf:'Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400' },
    C: { serif:'Montserrat', sans:'Montserrat', gf:'Montserrat:wght@300;400;600' }
};
const selF = fConfig[CONFIG.global.fuenteEstilo];
document.getElementById('font-link').href = `https://fonts.googleapis.com/css2?family=${selF.gf}&display=swap`;
r.setProperty('--title-font', `'${selF.serif}', serif`);
r.setProperty('--body-font', `'${selF.sans}', sans-serif`);

// Renderizar Portada
document.getElementById('t-eyebrow').textContent = CONFIG.global.frasePortada;
document.getElementById('t-names').innerHTML = CONFIG.global.nombres.replace('&', '<em>&</em>');
document.getElementById('t-cover-date').textContent = CONFIG.global.fechaPortada;
document.getElementById('cover-bg').style.backgroundImage = `url('${CONFIG.global.fotoPortada}')`;

const main = document.getElementById('main-content');

// SECCIÓN 1: HISTORIA
main.innerHTML += `<section class="section-wrapper" id="historia">
    <div class="container"><div class="icon-wrapper">${ICONOS.heart}</div>
    <h2>Nuestra <em>Historia</em></h2>
    <p>En un mundo lleno de coincidencias, encontrarnos fue nuestro momento favorito. Hoy decidimos caminar juntos por siempre.</p></div>
</section>`;

// SECCIÓN 2: CUENTA REGRESIVA
main.innerHTML += `<section class="section-wrapper" id="cuenta">
    <div class="container"><div class="icon-wrapper">${ICONOS.calendar}</div>
    <h2>Falta <em>Muy</em> Poco</h2>
    <div class="countdown-grid">
        <div class="cd-item"><span class="cd-num" id="days">00</span><span class="cd-lab">Días</span></div>
        <div class="cd-item"><span class="cd-num" id="hours">00</span><span class="cd-lab">Horas</span></div>
        <div class="cd-item"><span class="cd-num" id="mins">00</span><span class="cd-lab">Mins</span></div>
        <div class="cd-item"><span class="cd-num" id="secs">00</span><span class="cd-lab">Segs</span></div>
    </div></div>
</section>`;

// SECCIÓN 3: UBICACIÓN
const ev = CONFIG.eventos;
main.innerHTML += `<section class="section-wrapper" id="ubicacion">
    <div class="container"><div class="icon-wrapper">${ICONOS.map}</div>
    <h2>Cuándo <em>&</em> Dónde</h2>
    <div class="event-box">
        <h3 class="event-title">${ev.ceremonia.titulo}</h3>
        <p class="event-info"><strong>Fecha</strong> ${ev.ceremonia.fecha}</p>
        <p class="event-info"><strong>Hora</strong> ${ev.ceremonia.hora}</p>
        <p class="event-info"><strong>Lugar</strong> ${ev.ceremonia.lugar}</p>
        <p class="event-info">${ev.ceremonia.direccion}</p>
        <a href="${ev.ceremonia.linkMapa}" class="btn">Ver Mapa</a>
    </div>
    <div class="event-box">
        <h3 class="event-title">${ev.fiesta.titulo}</h3>
        <p class="event-info"><strong>Fecha</strong> ${ev.fiesta.fecha}</p>
        <p class="event-info"><strong>Hora</strong> ${ev.fiesta.hora}</p>
        <p class="event-info"><strong>Lugar</strong> ${ev.fiesta.lugar}</p>
        <p class="event-info">${ev.fiesta.direccion}</p>
        <a href="${ev.fiesta.linkMapa}" class="btn">Ver Mapa</a>
    </div></div>
</section>`;

// SECCIÓN 4: GALERÍA
let fotosHTML = '';
CONFIG.fotosGaleria.forEach(f => fotosHTML += `<div class="gallery-item" onclick="openLightbox(this)"><img src="${f}" alt="Foto"></div>`);
main.innerHTML += `<section class="section-wrapper" id="galeria">
    <div class="container"><div class="icon-wrapper">${ICONOS.camera}</div>
    <h2>Nuestros <em>Momentos</em></h2><div class="gallery-grid">${fotosHTML}</div></div>
</section>`;

// SECCIÓN 5: REGALOS
main.innerHTML += `<section class="section-wrapper" id="regalos">
    <div class="container"><div class="icon-wrapper">${ICONOS.gift}</div>
    <h2>Mesa de <em>Regalos</em></h2>
    <p>Tu presencia es nuestro mejor regalo. Si deseas tener un detalle, aquí tienes nuestra información.</p>
    <button class="btn" onclick="openGiftModal()">Ver Datos Bancarios</button></div>
</section>`;

// SECCIÓN 6: RSVP Y CIERRE
const rsvp = CONFIG.rsvp;
const cierre = CONFIG.cierre;
const ornamentoSVG = ORNAMENTOS[cierre.tipoOrnamento] || '';

main.innerHTML += `<section class="section-wrapper" id="rsvp">
    <div class="container"><div class="icon-wrapper">${ICONOS.rings}</div>
    <h2>${rsvp.titulo}</h2>
    <p>${rsvp.texto}</p>
    <a href="https://wa.me/${rsvp.whatsapp}?text=${encodeURIComponent(rsvp.mensajePredeterminado)}" class="btn btn-wa">Confirmar por WhatsApp</a>
    
    <div class="final-message">${cierre.mensaje}</div>
    <p>${cierre.subtexto}</p>
    <div class="ornament">${ornamentoSVG}</div>
    </div>
</section>`;

// Lógica de funciones
function openGiftModal() {
    const r = CONFIG.regalos;
    document.getElementById('bank-details').innerHTML = `<p><strong>${r.banco}</strong></p><p>Titular: ${r.titular}</p><p>${r.cuenta}</p><p>${r.ci}</p><p style="margin-top:10px; opacity:0.6"><em>${r.extra}</em></p>`;
    document.getElementById('gift-modal').style.display = 'flex';
}
function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }
function openLightbox(el) {
    const lb = document.getElementById('lightbox');
    lb.querySelector('img').src = el.querySelector('img').src;
    lb.style.display = 'flex';
}
function updateCountdown() {
    const t = CONFIG.global.fechaCuentaRegresiva - new Date();
    if (t < 0) return;
    document.getElementById('days').innerText = Math.floor(t / (1000*60*60*24));
    document.getElementById('hours').innerText = Math.floor((t / (1000*60*60)) % 24);
    document.getElementById('mins').innerText = Math.floor((t / 1000 / 60) % 60);
    document.getElementById('secs').innerText = Math.floor((t / 1000) % 60);
}
setInterval(updateCountdown, 1000);
const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.section-wrapper').forEach(sw => obs.observe(sw));
</script>
</body>
</html>
