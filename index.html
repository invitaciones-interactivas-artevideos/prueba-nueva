<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación — Sofía &amp; Martín</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { overflow-x: hidden; }
:root {
  --bg:#FAF7F2;--surface:#EDE8DF;--accent:#C9A98C;--muted:#8C7B6E;--dark:#2E2822;
  --white:#FFFFFF;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--dark);font-family:var(--sans);font-weight:300}
#cover{position:relative;height:100vh;min-height:600px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#cover-bg{position:absolute;inset:-10%;background-image:url('cover.jpg');background-size:cover;background-position:center;background-color:var(--muted);will-change:transform}
#cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.28) 0%,rgba(0,0,0,.04) 50%,rgba(0,0,0,.52) 100%)}
#cover-text{position:relative;text-align:center;color:var(--white);padding:2rem}
#cover-text .eyebrow{font-family:var(--sans);font-size:.72rem;letter-spacing:.38em;text-transform:uppercase;opacity:.85;margin-bottom:1.5rem;display:block}
#cover-text h1{font-family:var(--serif);font-size:clamp(3.5rem,10vw,7rem);font-weight:300;line-height:1.05;margin-bottom:1.25rem}
#cover-text h1 em{font-style:italic}
#cover-text .cover-date{font-family:var(--sans);font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;opacity:.9}
.scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;color:rgba(255,255,255,.7);font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
section{padding:5rem 1.5rem;max-width:680px;margin:0 auto;opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
section.visible{opacity:1;transform:none}
.divider-row{width:100%;display:flex;justify-content:center;padding:0}
.divider{width:48px;height:1px;background:var(--accent);margin:0 auto;opacity:.5}
.section-label{font-family:var(--sans);font-size:.68rem;letter-spacing:.38em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem;display:block}
h2{font-family:var(--serif);font-size:clamp(2rem,6vw,3.25rem);font-weight:300;line-height:1.15;margin-bottom:1.25rem;color:var(--dark)}
h2 em{font-style:italic}
p{font-size:1rem;line-height:1.85;color:var(--muted);margin-bottom:1rem}
#countdown{max-width:100%}
.cd-grid{display:flex;justify-content:center;align-items:flex-start;gap:0;margin:0 auto;max-width:480px}
.cd-unit{flex:1;text-align:center;padding:1.5rem .5rem;border-left:1px solid rgba(255,255,255,.08);position:relative}
.cd-unit:first-child{border-left:none}
.cd-number{font-family:var(--serif);font-weight:300;line-height:1;display:block;color:var(--white);letter-spacing:.02em}
.cd-label{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:.75rem;display:block}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:2rem}
.info-card{background:var(--surface);padding:2rem 1.5rem}
.info-card .ic-label{font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:.75rem}
.info-card .ic-value{font-family:var(--serif);font-size:1.45rem;font-weight:300;color:var(--dark);line-height:1.3}
.info-card .ic-sub{font-size:.85rem;color:var(--muted);margin-top:.4rem}
.map-wrapper{margin-top:2rem;overflow:hidden;background:var(--surface)}
.map-wrapper iframe{width:100%;height:320px;border:none;display:block;filter:grayscale(25%)}
.btn-outline{display:inline-flex;align-items:center;gap:.5rem;margin-top:1.25rem;padding:.85rem 2.25rem;border:1px solid var(--accent);border-radius:2px;font-family:var(--sans);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);text-decoration:none;background:transparent;transition:background .25s,color .25s,border-color .25s,box-shadow .25s;cursor:pointer}
.btn-outline:hover{background:var(--accent);color:var(--white);border-color:var(--accent);box-shadow:0 4px 18px rgba(0,0,0,.12)}
.gift-cards{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:2rem}
.gift-card{background:var(--surface);padding:2rem 1.5rem;text-align:center}
.gift-icon{font-size:1.75rem;margin-bottom:.75rem;display:block}
.gift-card h3{font-family:var(--serif);font-size:1.25rem;font-weight:300;margin-bottom:.5rem}
.gift-card p{font-size:.875rem;margin-bottom:1.25rem}
.gift-link{display:inline-flex;align-items:center;justify-content:center;padding:.75rem 1.75rem;border:1px solid var(--accent);border-radius:2px;font-family:var(--sans);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);text-decoration:none;background:transparent;transition:background .25s,color .25s,box-shadow .25s;cursor:pointer}
.gift-link:hover{background:var(--accent);color:var(--white);box-shadow:0 4px 18px rgba(0,0,0,.12)}
.bank-panel{display:none;margin-top:1.25rem;background:var(--bg);border:1px solid var(--accent);border-radius:3px;padding:1.5rem 1.75rem;text-align:left;animation:fadeDown .3s ease}
.bank-panel.open{display:block}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.bank-panel .bank-row{display:flex;justify-content:space-between;align-items:baseline;padding:.55rem 0;border-bottom:1px solid rgba(0,0,0,.06);gap:1rem}
.bank-panel .bank-row:last-child{border-bottom:none}
.bank-panel .bank-key{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);white-space:nowrap;flex-shrink:0}
.bank-panel .bank-val{font-family:var(--serif);font-size:1rem;color:var(--dark);text-align:right}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:2rem}
.g-wide{grid-column:span 2}
.gallery-item{background:var(--surface);overflow:hidden;aspect-ratio:1;cursor:pointer}
.gallery-item.g-wide{aspect-ratio:2/1}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease,filter .3s;filter:saturate(.85)}
.gallery-item:hover img{transform:scale(1.04);filter:saturate(1)}
.gallery-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.75rem;letter-spacing:.1em}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;align-items:center;justify-content:center;padding:2rem}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:82vh;object-fit:contain}
#lb-close{position:absolute;top:1.5rem;right:1.5rem;color:#fff;font-size:2rem;background:none;border:none;cursor:pointer;line-height:1}
#rsvp{text-align:center;padding:5rem 2rem}
.rsvp-inner{max-width:480px;margin:0 auto}
.rsvp-inner p{margin-bottom:2rem}
.wa-btn{display:inline-flex;align-items:center;gap:.65rem;padding:1rem 2.5rem;background:#25D366;color:#fff;border:1px solid transparent;border-radius:2px;font-family:var(--sans);font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;transition:background .25s,transform .15s,box-shadow .25s}
.wa-btn:hover{background:#1ebe5a;transform:translateY(-2px);box-shadow:0 6px 22px rgba(37,211,102,.3)}
.rsvp-deadline{margin-top:1.5rem;font-size:.8rem;color:var(--muted)}
footer{text-align:center;padding:3rem 1.5rem;font-family:var(--serif);font-size:1.5rem;font-weight:300;color:var(--accent);font-style:italic}
#music-btn{position:fixed;bottom:1.75rem;right:1.75rem;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border:1px solid var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:transform .2s,box-shadow .2s,background .2s;padding:0}
#music-btn:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(0,0,0,.2);background:rgba(255,255,255,1)}
#music-btn svg{width:18px;height:18px}
#music-btn .icon-play{display:block}
#music-btn .icon-pause{display:none}
#music-btn.playing .icon-play{display:none}
#music-btn.playing .icon-pause{display:block}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(201,169,140,.5)}70%{box-shadow:0 0 0 10px rgba(201,169,140,0)}100%{box-shadow:0 0 0 0 rgba(201,169,140,0)}}
#music-btn.playing{animation:pulse-ring 2.5s ease-out infinite}
@media(max-width:520px){.info-grid,.gift-cards{grid-template-columns:1fr}.gallery-grid{grid-template-columns:1fr 1fr}.g-wide{grid-column:span 2}.cd-number{font-size:2rem!important}.cd-unit{padding:1.25rem .25rem}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}section{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="cover">
  <div id="cover-bg"></div>
  <div id="cover-overlay"></div>
  <div id="cover-text">
    <span class="eyebrow" id="t-eyebrow"></span>
    <h1 id="t-names"></h1>
    <p class="cover-date" id="t-cover-date"></p>
  </div>
  <div class="scroll-hint">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
</div>
<div id="sections-container"></div>
<div id="lightbox" role="dialog" aria-label="Foto ampliada">
  <button id="lb-close" onclick="closeLightbox()" aria-label="Cerrar">×</button>
  <img id="lb-img" src="" alt="">
</div>
<footer id="t-footer"></footer>
<button id="music-btn" aria-label="Reproducir / pausar música">
  <svg class="icon-play" viewBox="0 0 24 24" fill="none">
    <polygon points="5 3 19 12 5 21 5 3" fill="var(--accent)" stroke="none"/>
  </svg>
  <svg class="icon-pause" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round">
    <line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/>
  </svg>
</button>
<audio id="bg-audio" loop></audio>
<script>
const PALETA_ELEGIDA = 3;
const PALETAS = {
  1:{bg:'#FAF7F2',surface:'#EDE8DF',accent:'#C9A98C',muted:'#8C7B6E',dark:'#2E2822'},
  2:{bg:'#F4F6F2',surface:'#E3E9E1',accent:'#7A9E7E',muted:'#6B7C69',dark:'#2A3328'},
  3:{bg:'#FDF5F5',surface:'#F5E6E6',accent:'#C97A8C',muted:'#9C6B78',dark:'#3A2028'},
  4:{bg:'#F2F4F8',surface:'#DDE3ED',accent:'#4A6FA5',muted:'#6B7E99',dark:'#1A253A'},
  5:{bg:'#F8F6F0',surface:'#EDEADE',accent:'#B8972A',muted:'#807060',dark:'#1A1810'},
  6:{bg:'#F7F5F0',surface:'#ECEADE',accent:'#8B8B5A',muted:'#7A7860',dark:'#2A2818'},
  7:{bg:'#F6F4FA',surface:'#EAE5F5',accent:'#8B6BAE',muted:'#7A6B8C',dark:'#2A1E38'},
  8:{bg:'#FBF7F3',surface:'#F2E8DF',accent:'#C4622D',muted:'#8C6B55',dark:'#2E1E0F'},
};
const PALETA = PALETAS[PALETA_ELEGIDA]||PALETAS[1];

const TIPOGRAFIA_ELEGIDA = 'A';
const TIPOGRAFIAS = {
  A:{serif:'Cormorant Garamond',sans:'Jost',gf:'Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500'},
  B:{serif:'Playfair Display',sans:'Lato',gf:'Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700'},
  C:{serif:'EB Garamond',sans:'Raleway',gf:'EB+Garamond:ital,wght@0,400;1,400&family=Raleway:wght@300;400;500'},
  D:{serif:'Libre Baskerville',sans:'Nunito Sans',gf:'Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:wght@300;400;600'},
  E:{serif:'Great Vibes',sans:'Montserrat',gf:'Great+Vibes&family=Montserrat:wght@300;400;500'},
  F:{serif:'Cinzel',sans:'Raleway',gf:'Cinzel:wght@400;600&family=Raleway:wght@300;400;500'},
};
const TIPOGRAFIA = TIPOGRAFIAS[TIPOGRAFIA_ELEGIDA]||TIPOGRAFIAS['A'];

// ★ EDITAR — DATOS DEL EVENTO
const EVENTO = {
  titulo: 'Invitación — Sofía & Martín',
  coverFoto: 'cover.jpg',
  fecha: new Date(2026, 10, 20, 21, 0),
  whatsappNumero: '59899123456',
  whatsappMensaje: '¡Hola! Confirmo mi asistencia a la boda de Sofía y Martín. Asistiremos: ',
  musicaArchivo: 'musica.mp3',
};

// ★ EDITAR — FONDOS POR SECCIÓN
const FONDOS = {
  intro:     'white',
  countdown: 'dark',
  details:   'bg',
  location:  'surface',
  gifts:     'white',
  gallery:   'bg',
  rsvp:      'surface',
};

// ★ EDITAR — TAMAÑO CUENTA REGRESIVA
const COUNTDOWN_ESTILO = {
  tamañoNumero: '3.8rem',
  padding:      '3.5rem',
};

// ★ EDITAR — TEXTOS
const TEXTOS = {
  portada:{
    eyebrow:'los invitamos a nuestra boda',
    nombres:'<em>Sofía</em><br>&amp;<br><em>Martín</em>',
    fechaTexto:'Sábado · 20 de octubre de 2026',
  },
  intro:{
    etiqueta:'· nuestra historia ·',
    titulo:'Queremos<br>celebrar <em>juntos</em>',
    parrafo1:'Después de años compartiendo momentos, risas y sueños, llegó el día de dar el paso más importante. Queremos que seas parte de este capítulo.',
    parrafo2:'Esta es tu invitación para acompañarnos en el día más especial de nuestras vidas.',
  },
  countdown:{
    etiqueta:'· faltan ·',
  },
  detalles:{
    etiqueta:'· el gran día ·',
    titulo:'Fecha <em>&amp;</em><br>Lugar',
    cards:[
      {etiqueta:'CEREMONIA',valor:'Iglesia San Francisco',sub:'18:00 hs · Av. Principal 1234, Montevideo'},
      {etiqueta:'FIESTA',valor:'Salón La Estancia',sub:'20:30 hs · Ruta 9 km 25, Canelones'},
      {etiqueta:'FECHA',valor:'Sábado<br>14 · 03 · 2026',sub:''},
      {etiqueta:'DRESS CODE',valor:'Formal'},
    ],
  },
  mapa:{
    etiqueta:'· cómo llegar ·',
    titulo:'<em>Ubicación</em>',
    direccion:'Salón La Estancia · Ruta 9 km 25, Canelones, Uruguay',
    iframeSrc:'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d26265.040583929377!2d-56.17!3d-34.9!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x959f802b29688a9d%3A0x9d4e8a16c23a2c6d!2sMontevideo%2C%20Uruguay!5e0!3m2!1ses!2suy!4v1700000000000',
    linkMaps:'https://maps.google.com/?q=Salon+La+Estancia+Ruta+8+Canelones+Uruguay',
    btnTexto:'Cómo llegar →',
  },
  regalos:{
    etiqueta:'· regalos ·',
    titulo:'Tu presencia es<br>el mejor <em>regalo</em>',
    parrafo:'Si querés tener un gesto adicional, estas son nuestras opciones:',
    cards:[
      {
        icono:'💳',
        titulo:'Colectivo',
        parrafo:'Hacenos una transferencia a nuestra cuenta.',
        btnTexto:'Ver datos de transferencia',
        datosBancarios:[
          {etiqueta:'Banco',valor:'BROU'},
          {etiqueta:'Número de cuenta',valor:'001-234567-8'},
          {etiqueta:'Titular',valor:'Sofía García'},
          {etiqueta:'CI / RUT',valor:'1.234.567-8'},
        ],
        linkPago:'',
      },
    ],
  },
  galeria:{
    etiqueta:'· nosotros ·',
    titulo:'Nuestra <em>historia</em><br>en fotos',
    fotos:[
      {src:'foto1.jpg',alt:'Nuestra primera foto juntos',wide:true},
      {src:'foto2.jpg',alt:'Un momento especial',wide:false},
      {src:'foto3.jpg',alt:'Juntos en familia',wide:false},
      {src:'foto4.jpg',alt:'Nuestro lugar favorito',wide:false},
      {src:'foto5.jpg',alt:'El compromiso',wide:true},
    ],
  },
  rsvp:{
    etiqueta:'· confirmá tu asistencia ·',
    titulo:'¿Venís a<br>celebrar <em>con nosotros?</em>',
    parrafo:'Confirmá tu presencia antes del 14 de febrero de 2026 para que podamos tenerte en cuenta en todos los detalles.',
    btnTexto:'Confirmar asistencia',
    deadline:'Fecha límite: 14 de febrero de 2026',
  },
  footer:'Con amor, Sofía &amp; Martín ♡',
};
const r=document.documentElement.style;
r.setProperty('--bg',PALETA.bg);r.setProperty('--surface',PALETA.surface);
r.setProperty('--accent',PALETA.accent);r.setProperty('--muted',PALETA.muted);
r.setProperty('--dark',PALETA.dark);
document.getElementById('font-link').href='https://fonts.googleapis.com/css2?family='+TIPOGRAFIA.gf+'&display=swap';
r.setProperty('--serif',"'"+TIPOGRAFIA.serif+"', Georgia, serif");
r.setProperty('--sans',"'"+TIPOGRAFIA.sans+"', system-ui, sans-serif");
document.title=EVENTO.titulo;
document.getElementById('cover-bg').style.backgroundImage=`url('${EVENTO.coverFoto}')`;
document.getElementById('t-eyebrow').textContent=TEXTOS.portada.eyebrow;
document.getElementById('t-names').innerHTML=TEXTOS.portada.nombres;
document.getElementById('t-cover-date').textContent=TEXTOS.portada.fechaTexto;
document.getElementById('t-footer').innerHTML=TEXTOS.footer;

function resolveColor(k){if(k==='bg')return PALETA.bg;if(k==='surface')return PALETA.surface;if(k==='dark')return PALETA.dark;if(k==='white')return'#FFFFFF';return k;}

function buildSections(){
  const c=document.getElementById('sections-container');
  appendSection(c,'intro',FONDOS.intro,`<span class="section-label">${TEXTOS.intro.etiqueta}</span><h2>${TEXTOS.intro.titulo}</h2><p>${TEXTOS.intro.parrafo1}</p><p>${TEXTOS.intro.parrafo2}</p>`);
  appendDivider(c);
  const cdDiv=document.createElement('div');
  cdDiv.style.width='100%';cdDiv.style.background=resolveColor(FONDOS.countdown);
  const cdSec=document.createElement('section');
  cdSec.id='countdown';cdSec.style.maxWidth='100%';
  cdSec.style.padding=`${COUNTDOWN_ESTILO.padding} 2rem`;
  cdSec.innerHTML=`<div style="max-width:680px;margin:0 auto;text-align:center"><span class="section-label" style="color:${PALETA.accent}">${TEXTOS.countdown.etiqueta}</span><div class="cd-grid"><div class="cd-unit"><span class="cd-number" id="cd-days" style="font-size:${COUNTDOWN_ESTILO.tamañoNumero}">---</span><span class="cd-label">días</span></div><div class="cd-unit"><span class="cd-number" id="cd-hours" style="font-size:${COUNTDOWN_ESTILO.tamañoNumero}">--</span><span class="cd-label">horas</span></div><div class="cd-unit"><span class="cd-number" id="cd-mins" style="font-size:${COUNTDOWN_ESTILO.tamañoNumero}">--</span><span class="cd-label">min</span></div><div class="cd-unit"><span class="cd-number" id="cd-secs" style="font-size:${COUNTDOWN_ESTILO.tamañoNumero}">--</span><span class="cd-label">seg</span></div></div></div>`;
  cdDiv.appendChild(cdSec);c.appendChild(cdDiv);
  appendDivider(c);
  const detCards=TEXTOS.detalles.cards.map(cd=>`<div class="info-card"><span class="ic-label">${cd.etiqueta}</span><span class="ic-value">${cd.valor}</span>${cd.sub?`<p class="ic-sub">${cd.sub}</p>`:''}</div>`).join('');
  appendSection(c,'details',FONDOS.details,`<span class="section-label">${TEXTOS.detalles.etiqueta}</span><h2>${TEXTOS.detalles.titulo}</h2><div class="info-grid">${detCards}</div>`);
  appendSection(c,'location',FONDOS.location,`<span class="section-label">${TEXTOS.mapa.etiqueta}</span><h2>${TEXTOS.mapa.titulo}</h2><p>${TEXTOS.mapa.direccion}</p><div class="map-wrapper"><iframe src="${TEXTOS.mapa.iframeSrc}" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div><a href="${TEXTOS.mapa.linkMaps}" target="_blank" rel="noopener" class="btn-outline">${TEXTOS.mapa.btnTexto}</a>`);
  appendDivider(c);
  const giftCards=TEXTOS.regalos.cards.map((cd,idx)=>{
    const pid=`bank-panel-${idx}`;
    const rows=cd.datosBancarios&&cd.datosBancarios.length?cd.datosBancarios.map(d=>`<div class="bank-row"><span class="bank-key">${d.etiqueta}</span><span class="bank-val">${d.valor}</span></div>`).join(''):'';
    const panel=rows?`<div class="bank-panel" id="${pid}">${rows}</div>`:'';
    const tog=rows?`onclick="togglePanel('${pid}',this);return false;"`:cd.linkPago?`onclick="window.open('${cd.linkPago}','_blank');return false;"`:'';;
    return`<div class="gift-card"><span class="gift-icon">${cd.icono}</span><h3>${cd.titulo}</h3><p>${cd.parrafo}</p><a href="#" class="gift-link" ${tog}>${cd.btnTexto}</a>${panel}</div>`;
  }).join('');
  appendSection(c,'gifts',FONDOS.gifts,`<span class="section-label">${TEXTOS.regalos.etiqueta}</span><h2>${TEXTOS.regalos.titulo}</h2><p>${TEXTOS.regalos.parrafo}</p><div class="gift-cards">${giftCards}</div>`);
  appendDivider(c);
  const galItems=TEXTOS.galeria.fotos.map((f,i)=>`<div class="gallery-item${f.wide?' g-wide':''}" onclick="openLightbox(this)"><img src="${f.src}" alt="${f.alt}" onerror="this.parentElement.innerHTML='<div class=\\'gallery-placeholder\\'>foto ${i+1}</div>'"></div>`).join('');
  appendSection(c,'gallery',FONDOS.gallery,`<span class="section-label">${TEXTOS.galeria.etiqueta}</span><h2>${TEXTOS.galeria.titulo}</h2><div class="gallery-grid">${galItems}</div>`);
  appendDivider(c);
  appendSection(c,'rsvp',FONDOS.rsvp,`<div class="rsvp-inner" style="text-align:center;max-width:480px;margin:0 auto"><span class="section-label">${TEXTOS.rsvp.etiqueta}</span><h2>${TEXTOS.rsvp.titulo}</h2><p>${TEXTOS.rsvp.parrafo}</p><a class="wa-btn" href="https://wa.me/${EVENTO.whatsappNumero}?text=${encodeURIComponent(EVENTO.whatsappMensaje)}" target="_blank" rel="noopener"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg><span>${TEXTOS.rsvp.btnTexto}</span></a><p class="rsvp-deadline">${TEXTOS.rsvp.deadline}</p></div>`);
}

function appendSection(c,id,bgKey,html){
  const bg=resolveColor(bgKey);
  const wrap=document.createElement('div');
  wrap.style.width='100%';wrap.style.background=bg;
  const sec=document.createElement('section');
  sec.id=id;sec.innerHTML=html;
  wrap.appendChild(sec);c.appendChild(wrap);
}
function appendDivider(c){
  const d=document.createElement('div');
  d.className='divider-row';d.style.padding='2.5rem 0';
  d.innerHTML='<div class="divider"></div>';c.appendChild(d);
}
buildSections();

function togglePanel(id,btn){
  const p=document.getElementById(id);if(!p)return;
  const isOpen=p.classList.toggle('open');
  if(!btn.dataset.original)btn.dataset.original=btn.textContent;
  btn.textContent=isOpen?'Ocultar datos ↑':btn.dataset.original;
}

(function(){
  const de=document.getElementById('cd-days'),he=document.getElementById('cd-hours'),me=document.getElementById('cd-mins'),se=document.getElementById('cd-secs');
  if(!de)return;
  function tick(){var d=EVENTO.fecha.getTime()-new Date().getTime();if(d<=0){de.textContent='000';he.textContent='00';me.textContent='00';se.textContent='00';return;}de.textContent=String(Math.floor(d/86400000)).padStart(3,'0');he.textContent=String(Math.floor((d%86400000)/3600000)).padStart(2,'0');me.textContent=String(Math.floor((d%3600000)/60000)).padStart(2,'0');se.textContent=String(Math.floor((d%60000)/1000)).padStart(2,'0');}
  tick();setInterval(tick,1000);
})();

const coverBg=document.getElementById('cover-bg');
window.addEventListener('scroll',()=>{const sy=window.scrollY;const ch=document.getElementById('cover').offsetHeight;if(sy<ch+100)coverBg.style.transform=`translateY(${sy*.35}px)`;},{passive:true});

const observer=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);}});},{threshold:0.1});
document.querySelectorAll('section').forEach(s=>observer.observe(s));

function openLightbox(el){const img=el.querySelector('img');if(!img)return;document.getElementById('lb-img').src=img.src;document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});

(function(){
  const audio=document.getElementById('bg-audio');
  const btn=document.getElementById('music-btn');
  if(!EVENTO.musicaArchivo){btn.style.display='none';return;}
  audio.src=EVENTO.musicaArchivo;audio.volume=0.5;
  btn.addEventListener('click',function(){if(audio.paused){audio.play().then(()=>btn.classList.add('playing')).catch(()=>{});}else{audio.pause();btn.classList.remove('playing');}});
})();
</script>
