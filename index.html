<title>Invitación — Sofía &amp; Martín</title>

<!-- Fuentes: se cargan según CONFIG.fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="" rel="stylesheet">

<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { overflow-x: hidden; transition: background 0.3s; }

/* ── VARIABLES DE TEMA — se sobreescriben vía JS desde CONFIG ── */
:root {
  --bg:      #FAF7F2;
  --surface: #EDE8DF;
  --accent:  #C9A98C;
  --muted:   #8C7B6E;
  --dark:    #2E2822;
  --white:   #FFFFFF;
  --serif:   'Cormorant Garamond', Georgia, serif;
  --sans:    'Jost', system-ui, sans-serif;
}

body { background: var(--bg); color: var(--dark); font-family: var(--sans); font-weight: 300; }

/* ── PORTADA ── */
#cover {
  position: relative; height: 100vh; min-height: 600px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; overflow: hidden;
}
#cover-bg {
  position: absolute; inset: -10%;
  background-image: url('cover.jpg');
  background-size: cover; background-position: center;
  background-color: var(--muted);
  will-change: transform;
}
#cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.28) 0%, rgba(0,0,0,.04) 50%, rgba(0,0,0,.52) 100%);
}
#cover-text {
  position: relative; text-align: center;
  color: var(--white); padding: 2rem;
}
#cover-text .eyebrow {
  font-family: var(--sans); font-size: .72rem;
  letter-spacing: .38em; text-transform: uppercase;
  opacity: .85; margin-bottom: 1.5rem; display: block;
}
#cover-text h1 {
  font-family: var(--serif);
  font-size: clamp(3.5rem, 10vw, 7rem);
  font-weight: 300; line-height: 1.05; margin-bottom: 1.25rem;
}
#cover-text h1 em { font-style: italic; }
#cover-text .cover-date {
  font-family: var(--sans); font-size: .85rem;
  letter-spacing: .2em; text-transform: uppercase; opacity: .9;
}
.scroll-hint {
  position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: .5rem;
  color: rgba(255,255,255,.7); font-size: .68rem;
  letter-spacing: .2em; text-transform: uppercase;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(8px); }
}

/* ── SECCIONES GENERALES ── */
section {
  padding: 5rem 1.5rem; max-width: 680px; margin: 0 auto;
  opacity: 0; transform: translateY(28px);
  transition: opacity .7s ease, transform .7s ease;
}
section.visible { opacity: 1; transform: none; }
.full-width { max-width: 100%; }

.section-label {
  font-family: var(--sans); font-size: .68rem;
  letter-spacing: .38em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 1.5rem; display: block;
}
h2 {
  font-family: var(--serif);
  font-size: clamp(2rem, 6vw, 3.25rem);
  font-weight: 300; line-height: 1.15; margin-bottom: 1.25rem;
  color: var(--dark);
}
h2 em { font-style: italic; }
p { font-size: 1rem; line-height: 1.85; color: var(--muted); margin-bottom: 1rem; }
.divider { width: 48px; height: 1px; background: var(--accent); margin: 2.5rem auto; opacity: .5; }

/* ── CUENTA REGRESIVA ── */
#countdown { background: var(--dark); padding: 4.5rem 2rem; }
#countdown .section-label { color: var(--accent); }
.cd-grid {
  display: flex; justify-content: center; align-items: flex-start;
  gap: 0; margin: 0 auto; max-width: 520px;
}
.cd-unit {
  flex: 1; text-align: center; padding: 2rem .5rem;
  border-left: 1px solid rgba(255,255,255,.08);
  position: relative;
}
.cd-unit:first-child { border-left: none; }
.cd-number {
  font-family: var(--serif);
  font-size: clamp(2.8rem, 7vw, 4.5rem);
  font-weight: 300; line-height: 1; display: block;
  color: var(--white);
  letter-spacing: .02em;
}
.cd-label {
  font-size: .58rem; letter-spacing: .3em; text-transform: uppercase;
  color: rgba(255,255,255,.3); margin-top: .75rem; display: block;
}

/* ── INFO CARDS ── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-top: 2rem; }
.info-card { background: var(--surface); padding: 2rem 1.5rem; }
.info-card .ic-label {
  font-size: .62rem; letter-spacing: .3em; text-transform: uppercase;
  color: var(--accent); display: block; margin-bottom: .75rem;
}
.info-card .ic-value {
  font-family: var(--serif); font-size: 1.45rem;
  font-weight: 300; color: var(--dark); line-height: 1.3;
}
.info-card .ic-sub { font-size: .85rem; color: var(--muted); margin-top: .4rem; }

/* ── MAPA ── */
.map-wrapper { margin-top: 2rem; overflow: hidden; background: var(--surface); }
.map-wrapper iframe { width: 100%; height: 320px; border: none; display: block; filter: grayscale(25%); }
.btn-outline {
  display: inline-block; margin-top: 1.25rem; padding: .75rem 2rem;
  border: 1px solid var(--dark); font-family: var(--sans);
  font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--dark); text-decoration: none;
  transition: background .2s, color .2s;
}
.btn-outline:hover { background: var(--dark); color: var(--white); }

/* ── REGALOS ── */
.gift-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-top: 2rem; }
.gift-card { background: var(--surface); padding: 2rem 1.5rem; text-align: center; }
.gift-icon { font-size: 1.75rem; margin-bottom: .75rem; display: block; }
.gift-card h3 { font-family: var(--serif); font-size: 1.25rem; font-weight: 300; margin-bottom: .5rem; }
.gift-card p { font-size: .875rem; margin-bottom: 1.25rem; }
.gift-link {
  display: inline-block; padding: .6rem 1.5rem; border: 1px solid var(--dark);
  font-size: .68rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--dark); text-decoration: none; transition: background .2s, color .2s;
}
.gift-link:hover { background: var(--dark); color: var(--white); }

/* ── GALERÍA ── */
.gallery-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; margin-top: 2rem; }
.g-wide { grid-column: span 2; }
.gallery-item { background: var(--surface); overflow: hidden; aspect-ratio: 1; cursor: pointer; }
.gallery-item.g-wide { aspect-ratio: 2/1; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease, filter .3s; filter: saturate(.85); }
.gallery-item:hover img { transform: scale(1.04); filter: saturate(1); }
.gallery-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center;
  justify-content: center; color: var(--muted); font-size: .75rem; letter-spacing: .1em;
}

/* ── LIGHTBOX ── */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.92); z-index: 999;
  align-items: center; justify-content: center; padding: 2rem;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 82vh; object-fit: contain; }
#lb-close {
  position: absolute; top: 1.5rem; right: 1.5rem;
  color: #fff; font-size: 2rem; background: none; border: none; cursor: pointer; line-height: 1;
}

/* ── RSVP ── */
#rsvp { text-align: center; background: var(--surface); padding: 5rem 2rem; }
.rsvp-inner { max-width: 480px; margin: 0 auto; }
.rsvp-inner p { margin-bottom: 2rem; }
.wa-btn {
  display: inline-flex; align-items: center; gap: .65rem;
  padding: 1rem 2.25rem; background: #25D366; color: #fff;
  font-family: var(--sans); font-size: .78rem;
  letter-spacing: .15em; text-transform: uppercase;
  text-decoration: none; transition: background .2s, transform .15s;
}
.wa-btn:hover { background: #1ebe5a; transform: translateY(-1px); }
.rsvp-deadline { margin-top: 1.5rem; font-size: .8rem; color: var(--muted); }

/* ── FOOTER ── */
footer { text-align: center; padding: 3rem 1.5rem; font-family: var(--serif); font-size: 1.5rem; font-weight: 300; color: var(--accent); font-style: italic; }

/* ── RESPONSIVE ── */
@media (max-width: 520px) {
  .info-grid, .gift-cards { grid-template-columns: 1fr; }
  .gallery-grid { grid-template-columns: 1fr 1fr; }
  .g-wide { grid-column: span 2; }
  .cd-grid { gap: 0; }
  .cd-number { font-size: 2.2rem; }
  .cd-unit { padding: 1.5rem .25rem; }
}
@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after { animation: none !important; transition: none !important; }
  section { opacity: 1; transform: none; }
}
</style>
</head>

// ── CUENTA REGRESIVA ──
(function() {
  var daysEl  = document.getElementById('cd-days');
  var hoursEl = document.getElementById('cd-hours');
  var minsEl  = document.getElementById('cd-mins');
  var secsEl  = document.getElementById('cd-secs');

  function tick() {
    var ahora = new Date();
    var diff  = EVENTO.fecha.getTime() - ahora.getTime();

    if (diff <= 0) {
      daysEl.textContent  = '000';
      hoursEl.textContent = '00';
      minsEl.textContent  = '00';
      secsEl.textContent  = '00';
      return;
    }

    var dias  = Math.floor(diff / 86400000);
    var horas = Math.floor((diff % 86400000) / 3600000);
    var mins  = Math.floor((diff % 3600000)  / 60000);
    var segs  = Math.floor((diff % 60000)    / 1000);

    daysEl.textContent  = String(dias).padStart(3, '0');
    hoursEl.textContent = String(horas).padStart(2, '0');
    minsEl.textContent  = String(mins).padStart(2, '0');
    secsEl.textContent  = String(segs).padStart(2, '0');
  }

  tick();
  setInterval(tick, 1000);
})();

// ── PARALLAX PORTADA ──
const coverBg = document.getElementById('cover-bg');
window.addEventListener('scroll', () => {
  const sy = window.scrollY;
  const ch = document.getElementById('cover').offsetHeight;
  if (sy < ch + 100) coverBg.style.transform = `translateY(${sy * 0.35}px)`;
}, { passive: true });

// ── REVEAL AL SCROLL ──
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
  });
}, { threshold: 0.1 });
document.querySelectorAll('section').forEach(s => observer.observe(s));

// ── LIGHTBOX ──
function openLightbox(el) {
  const img = el.querySelector('img');
  if (!img) return;
  document.getElementById('lb-img').src = img.src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
