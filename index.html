<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="" rel="stylesheet">

<style>
/* ── VARIABLES DE DISEÑO ── */
:root {
  --bg-1: #ffffff;
  --bg-2: #f9f9f9;
  --accent: #D4A5A5; 
  --title-color: #4A3B3B;
  --text-color: #8A7575;
  --title-font: 'Cormorant Garamond', serif;
  --body-font: 'Jost', sans-serif;
  --title-lh: 1.0;
  --section-spacing: 7rem;
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
    background-color: var(--bg-1); color: var(--text-color); 
    font-family: var(--body-font); line-height: 1.7; text-align: center;
}

/* ── ANIMACIONES ── */
@keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
@keyframes drawPath { from { stroke-dashoffset: 100; opacity: 0; } to { stroke-dashoffset: 0; opacity: 1; } }
@keyframes twinkle { 
    0%, 100% { opacity: 0.4; transform: scale(1) translateY(0); filter: drop-shadow(0 0 0px white); } 
    50% { opacity: 1; transform: scale(1.1) translateY(10px); filter: drop-shadow(0 0 8px white); } 
}

.icon-wrapper { 
    width: 60px; height: 60px; margin: 0 auto 1.5rem; color: var(--accent);
    animation: float 4s ease-in-out infinite;
}
.icon-wrapper svg { width: 100%; height: 100%; stroke-dasharray: 100; stroke-dashoffset: 100; }
.visible .icon-wrapper svg { animation: drawPath 2.5s ease-out forwards; }

/* ── PORTADA ── */
#cover {
  position: relative; height: 100vh; display: flex; 
  align-items: center; justify-content: center; overflow: hidden; color: white;
}
#cover-bg {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  transform: scale(1.05);
}
#cover-overlay {
  position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
}
#cover-content { position: relative; z-index: 2; padding: 20px; }
#cover h1 { font-family: var(--title-font); font-size: clamp(3rem, 12vw, 6rem); font-weight: 300; margin-bottom: 1rem;}
.eyebrow { text-transform: uppercase; letter-spacing: 6px; font-size: 0.75rem; margin-bottom: 2rem; display: block; }

/* Flecha Tintineante */
.scroll-arrow {
    position: absolute; bottom: 30px; left: 50%; margin-left: -15px;
    width: 30px; height: 30px; color: white; z-index: 10;
    animation: twinkle 2s infinite ease-in-out;
}

/* ── BOTONES 3D "BURBUJA" ── */
.btn {
    display: inline-block; padding: 1.1rem 2.5rem; margin-top: 1.5rem;
    background: linear-gradient(180deg, #FDF8F8 0%, #F2E4E4 100%);
    color: var(--title-color); border: none; border-radius: 50px;
    font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
    text-decoration: none; cursor: pointer; transition: all 0.3s ease;
    box-shadow: 0 10px 20px rgba(0,0,0,0.08), inset 0 -4px 6px rgba(0,0,0,0.05), inset 0 4px 6px rgba(255,255,255,0.8);
}
.btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.12); }
.btn:active { transform: translateY(1px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

.btn-pink { background: linear-gradient(180deg, #F7D7D7 0%, #EBC2C2 100%); }

/* ── BOTÓN MÚSICA PERSISTENTE ── */
#music-btn {
    position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px;
    border-radius: 50%; background: var(--bg-1); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 3000; transition: all 0.3s;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1), inset 0 2px 4px white;
}
#music-btn.playing { animation: float 3s ease-in-out infinite; color: var(--title-color); }

/* ── SECCIONES ── */
.section-wrapper {
    padding: var(--section-spacing) 1.5rem;
    opacity: 0; transform: translateY(30px);
    transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}
.section-wrapper.visible { opacity: 1; transform: translateY(0); }
.section-wrapper:nth-child(odd) { background-color: var(--bg-1); }
.section-wrapper:nth-child(even) { background-color: var(--bg-2); }
h2 { font-family: var(--title-font); font-size: 3.5rem; color: var(--title-color); line-height: var(--title-lh); margin-bottom: 2rem; }

/* ── GALERÍA ── */
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 3rem; }
.gallery-item { overflow: hidden; aspect-ratio: 1/1; cursor: pointer; border-radius: 20px; opacity: 0; transform: scale(0.9); transition: 0.8s all ease; }
.visible .gallery-item { opacity: 1; transform: scale(1); }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

/* ── MODAL CRISTAL (REGALOS) ── */
.modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; z-index: 4000;
}
.modal-content {
    background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.3); padding: 2.5rem 1.5rem;
    border-radius: 35px; max-width: 400px; width: 90%; color: white;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
}
.bank-card { background: rgba(0, 0, 0, 0.25); border-radius: 25px; padding: 1.5rem; margin: 1.5rem 0; border: 1px solid rgba(255,255,255,0.15); }
.bank-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center;}
.bank-item:last-child { border-bottom: none; }
.bank-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; display: block; }
.bank-value { font-size: 1.1rem; display: block; font-weight: 300; }

#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
#lightbox img { max-width: 90%; max-height: 85%; border-radius: 10px; }

@media (max-width: 600px) { h2 { font-size: 2.8rem; } .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<!-- Botón de Música -->
<div id="music-btn" onclick="toggleMusic()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
</div>
<audio id="bg-music" loop></audio>

<!-- Portada -->
<div id="cover">
    <div id="cover-bg"></div>
    <div id="cover-overlay"></div>
    <div id="cover-content">
        <span class="eyebrow" id="t-eyebrow"></span>
        <h1 id="t-names"></h1>
        <p id="t-cover-date" style="letter-spacing:3px; text-transform:uppercase; font-size:0.8rem;"></p>
    </div>
    <div class="scroll-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
    </div>
</div>

<div id="main-content"></div>

<!-- Cierre Final -->
<div id="cierre-final" class="section-wrapper" style="padding-bottom: 10rem;">
    <div class="container">
        <div id="final-text-container"></div>
        <div id="ornament-container" style="width:160px; margin: 3rem auto; color: var(--accent); opacity: 0.6;"></div>
    </div>
</div>

<!-- Modal Regalos -->
<div id="gift-modal" class="modal" onclick="if(event.target==this) closeGiftModal()">
    <div class="modal-content">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">🎁</div>
        <h2 style="color:white; font-size: 2rem;">Regalo</h2>
        <p id="m-texto-regalo"></p>
        <a href="#" id="m-link-colectivo" class="btn btn-pink" style="width: 100%; margin-bottom: 10px;">Ver Colectivo</a>
        <div class="bank-card">
            <div class="bank-item"><span class="bank-label">Titular</span><span class="bank-value" id="m-titular"></span></div>
            <div class="bank-item"><span class="bank-label">Banco</span><span class="bank-value" id="m-banco"></span></div>
            <div class="bank-item"><span class="bank-label">Cuenta / CBU</span><span class="bank-value" id="m-cuenta"></span></div>
            <div class="bank-item"><span class="bank-label">CI / DNI</span><span class="bank-value" id="m-ci"></span></div>
        </div>
        <button class="btn btn-pink" style="width: 100%;" onclick="copyAccount()">Copiar número de cuenta</button>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img src=""></div>

<script>
/* ════════════════════════════════════════
   ★ CONFIGURACIÓN FÁCIL
═════════════════════════════════════════= */

const CONFIG = {
    global: {
        nombres: "Sofía & Martín",
        frasePortada: "¡Nos Casamos!",
        fechaPortada: "20 . 12 . 2026",
        fechaCuentaRegresiva: new Date(2026, 11, 20, 18, 0),
        fotoPortada: "cover.jpg",
        musica: "musica.mp3"
    },
    eventos: {
        ceremonia: { titulo: "Ceremonia", fecha: "Sábado 20 de Dic", hora: "18:00 Hs", lugar: "Parroquia San José", direccion: "Calle de la Fe 123", mapa: "#" },
        fiesta: { titulo: "Fiesta", fecha: "Sábado 20 de Dic", hora: "21:00 Hs", lugar: "Salón Jardines", direccion: "Av. Principal 456", mapa: "#" }
    },
    regalos: {
        texto: "El mejor regalo es tu presencia, pero si deseas colaborar con nuestros sueños:",
        titular: "Sofía y Martín",
        banco: "Santander",
        cuenta: "1234567890",
        ci: "1.234.567-8",
        linkColectivo: "#"
    },
    cierre: { mensaje: "¡Te esperamos!", subtexto: "Para nosotros es muy importante que nos acompañes.", tipo: "floral" },
    fotosGaleria: ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg", "foto6.jpg", "foto7.jpg", "foto8.jpg", "foto9.jpg", "foto10.jpg"]
};

/* ════════════════════════════════════════
   LÓGICA INTERNA
═════════════════════════════════════════= */

const ORNAMENTOS = {
    floral: `<svg viewBox="0 0 100 40" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M10 20 Q25 10 40 20 T70 20 T90 20"/><path d="M30 15 Q35 5 40 15"/><path d="M60 15 Q65 5 70 15"/><circle cx="50" cy="20" r="1.5"/></svg>`,
    minimal: `<svg viewBox="0 0 100 20" stroke="currentColor" stroke-width="0.5"><line x1="0" y1="10" x2="40" y2="10"/><circle cx="50" cy="10" r="2" fill="none"/><line x1="60" y1="10" x2="100" y2="10"/></svg>`
};

const ICONOS = {
    heart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
    calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
    map: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    camera: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
    rings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="8" cy="12" r="6"/><circle cx="16" cy="12" r="6"/></svg>`,
    gift: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>`
};

const main = document.getElementById('main-content');
const r = (id, icon, title, body) => {
    main.innerHTML += `<section class="section-wrapper" id="${id}"><div class="container"><div class="icon-wrapper">${ICONOS[icon]}</div><h2>${title}</h2>${body}</div></section>`;
};

// Renderizar Portada
document.getElementById('t-eyebrow').innerText = CONFIG.global.frasePortada;
document.getElementById('t-names').innerHTML = CONFIG.global.nombres.replace('&', '<em>&</em>');
document.getElementById('t-cover-date').innerText = CONFIG.global.fechaPortada;
document.getElementById('cover-bg').style.backgroundImage = `url('${CONFIG.global.fotoPortada}')`;
document.getElementById('bg-music').src = CONFIG.global.musica;

// 1. Historia
r('historia', 'heart', 'Nuestra <em>Historia</em>', `<p>En un mundo lleno de coincidencias, encontrarnos fue nuestro momento favorito.</p>`);

// 2. Cuenta Regresiva
r('cuenta', 'calendar', 'Falta <em>Muy</em> Poco', `<div class="countdown-grid" style="max-width:500px; margin:2rem auto"><div class="cd-item"><span class="cd-num" id="days">00</span><span class="cd-lab">Días</span></div><div class="cd-item"><span class="cd-num" id="hours">00</span><span class="cd-lab">Hs</span></div><div class="cd-item"><span class="cd-num" id="mins">00</span><span class="cd-lab">Min</span></div><div class="cd-item"><span class="cd-num" id="secs">00</span><span class="cd-lab">Seg</span></div></div>`);

// 3. Ubicación
const ev = CONFIG.eventos;
r('ubicacion', 'map', 'Cuándo <em>&</em> Dónde', `
    <div style="margin-bottom:4rem"><h3 style="font-family:var(--title-font); font-size:2rem; color:var(--accent)">${ev.ceremonia.titulo}</h3><p><strong>Fecha:</strong> ${ev.ceremonia.fecha}<br><strong>Hora:</strong> ${ev.ceremonia.hora}<br><strong>Lugar:</strong> ${ev.ceremonia.lugar}<br>${ev.ceremonia.direccion}</p><a href="${ev.ceremonia.map}" class="btn">Ver Mapa</a></div>
    <div><h3 style="font-family:var(--title-font); font-size:2rem; color:var(--accent)">${ev.fiesta.titulo}</h3><p><strong>Fecha:</strong> ${ev.fiesta.fecha}<br><strong>Hora:</strong> ${ev.fiesta.hora}<br><strong>Lugar:</strong> ${ev.fiesta.lugar}<br>${ev.fiesta.direccion}</p><a href="${ev.fiesta.map}" class="btn">Ver Mapa</a></div>
`);

// 4. Galería
let gH = `<div class="gallery-grid">`;
CONFIG.fotosGaleria.forEach(f => gH += `<div class="gallery-item" onclick="openLightbox('${f}')"><img src="${f}"></div>`);
r('galeria', 'camera', 'Momentos', gH + `</div>`);

// 5. RSVP
r('rsvp', 'rings', 'Confirmación', `<p>Por favor, confírmanos tu asistencia por WhatsApp.</p><a href="#" class="btn btn-pink">Confirmar Asistencia</a>`);

// 6. Regalos
r('regalos', 'gift', 'Regalos', `<p>Si deseas hacernos un presente...</p><button class="btn" onclick="openGiftModal()">Ver Datos Bancarios</button>`);

// Cierre
document.getElementById('final-text-container').innerHTML = `<div style="font-family:var(--title-font); font-size:3rem; color:var(--title-color)">${CONFIG.cierre.mensaje}</div><p>${CONFIG.cierre.subtexto}</p>`;
document.getElementById('ornament-container').innerHTML = ORNAMENTOS[CONFIG.cierre.tipo];

// Funciones
function toggleMusic() {
    const a = document.getElementById('bg-music');
    const b = document.getElementById('music-btn');
    if (a.paused) { a.play(); b.classList.add('playing'); } else { a.pause(); b.classList.remove('playing'); }
}
function openLightbox(s) { document.getElementById('lightbox').querySelector('img').src = s; document.getElementById('lightbox').style.display = 'flex'; history.pushState({lb:1}, ""); }
function openGiftModal() {
    const reg = CONFIG.regalos;
    document.getElementById('m-texto-regalo').innerText = reg.texto;
    document.getElementById('m-titular').innerText = reg.titular;
    document.getElementById('m-banco').innerText = reg.banco;
    document.getElementById('m-cuenta').innerText = reg.cuenta;
    document.getElementById('m-ci').innerText = reg.ci;
    document.getElementById('m-link-colectivo').href = reg.linkColectivo;
    document.getElementById('gift-modal').style.display = 'flex';
    history.pushState({modal:1}, "");
}
function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }
function copyAccount() { navigator.clipboard.writeText(CONFIG.regalos.cuenta); alert("Copiado!"); }

window.onpopstate = () => { document.getElementById('gift-modal').style.display = 'none'; document.getElementById('lightbox').style.display = 'none'; };

function updateCD() {
    const t = CONFIG.global.fechaCuentaRegresiva - new Date();
    if(t<0) return;
    document.getElementById('days').innerText = Math.floor(t/86400000);
    document.getElementById('hours').innerText = Math.floor((t/3600000)%24);
    document.getElementById('mins').innerText = Math.floor((t/60000)%60);
    document.getElementById('secs').innerText = Math.floor((t/1000)%60);
}
setInterval(updateCD, 1000);
const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold:0.1});
document.querySelectorAll('.section-wrapper').forEach(s => obs.observe(s));
</script>
</body>
</html>
